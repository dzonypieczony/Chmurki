<!DOCTYPE html>
<html lang="pl-PL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Pogoda na każdy dzień - Białystok</title>
</head>
<body>
    <div class="strona">
        <header>
            <div class="naglowek_miasta">
                <h3 class="powrot">
                    <a href="index.html">
                        <p>Wróć na stronę główną</p>
                        <img src="misc/arrow-narrow-left.svg">
                    </a>
                </h3>
                <h1>Pogoda: Białystok</h1>
            </div>
        </header>
        <div class="glowna_zawartosc">
            <div class="miasto_zawartosc">
                <article class="element_pogody">
                    <h2>Temperatura:</h2>
                    <img src="temperatura/thermometer-colder.svg">
                    <p>-8°C</p>
                </article>
                <article class="element_pogody">
                    <h2>Wiatr:</h2>
                    <img src="wiatr/wind.svg">
                    <p>32km/h</p>
                </article>
                <article class="element_pogody">
                    <h2>Zachmurzenie i opady:</h2>
                    <img src="zachmurzenie_opady/rain.svg">
                    <p>Deszcz</p>
                </article>
                <article class="element_pogody">
                    <h2>Ciśnienie:</h2>
                    <img src="cisnienie/pressure-high.svg">
                    <p>1035hPa</p>
                </article>
            </div>
        </div>
        <footer>Przekaż 1,5% podatku na fundację <b>Pogoda dla każdego</b></footer>
    </div>
